<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #000;
        padding: 8px;
        text-align: center;
      }
      caption {
        font-size: 1.5em;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Lịch Công Tác Tuần</h1>
    <table>
      <caption>
        Lịch làm việc chi tiết từ thứ 2 đến thứ 6
      </caption>
      <tr>
        <th>Thời gian</th>
        <th>Thứ 2</th>
        <th>Thứ 3</th>
        <th>Thứ 4</th>
        <th>Thứ 5</th>
        <th>Thứ 6</th>
      </tr>
      <tr>
        <td>Sáng</td>
        <td colspan="3">Họp giao ban</td>
        <td rowspan="2">Khảo sát thực địa</td>
        <td>Làm việc tại văn phòng</td>
      </tr>
      <tr>
        <td>Chiều</td>
        <td>Xử lý email</td>
        <td>Lên kế hoạch</td>
        <td>Họp dự án</td>
        <td>Báo cáo tuần</td>
      </tr>
    </table>
  </body>
</html>
