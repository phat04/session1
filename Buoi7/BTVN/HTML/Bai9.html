<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sự Kiện Rikkei Academy</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- File CSS biên dịch từ SCSS -->
    <link rel="stylesheet" href="../SCSS/Bai9.css" />
  </head>

  <body>
    <div class="container py-5">
      <div class="card shadow-lg border-0 overflow-hidden event-card">
        <div class="row g-0">
          <!-- Ảnh sự kiện -->
          <div class="col-md-5">
            <img
              src="https://images.unsplash.com/photo-1511578314322-379afb476865"
              alt="Tech Talk Event"
              class="event-image"
            />
          </div>

          <!-- Nội dung -->
          <div class="col-md-7">
            <div class="card-body p-5">
              <h2 class="fw-bold mb-4 event-title">
                Tech Talk: Tương Lai Lập Trình AI
              </h2>

              <p class="text-secondary fs-5">
                Tham gia cùng Rikkei Academy để khám phá những xu hướng công
                nghệ AI mới nhất và cách ứng dụng vào phát triển phần mềm trong
                tương lai.
              </p>

              <p class="mt-4 mb-2 fs-5">
                <strong>Thời gian:</strong>
                09:00 - 12:00, 25/11/2026
              </p>

              <p class="mb-4 fs-5">
                <strong>Địa điểm:</strong>
                Cơ sở Rikkei Academy HN
              </p>

              <!-- Button -->
              <div class="d-flex gap-3">
                <button class="btn btn-primary px-4 py-2 fw-semibold">
                  Đăng Ký Ngay
                </button>

                <button class="btn btn-dark px-4 py-2 fw-semibold">
                  Xem Chi Tiết
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
