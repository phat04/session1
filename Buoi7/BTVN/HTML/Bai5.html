<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thêm Sách Mới</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm p-4 mx-auto" style="max-width: 700px">
        <h1 class="text-center fw-bold mb-4">Thêm Sách Mới</h1>

        <form>
          <!-- Tên sách -->
          <div class="mb-4">
            <label for="bookName" class="form-label fw-semibold">
              Tên sách
            </label>
            <input
              type="text"
              id="bookName"
              class="form-control form-control-lg"
              placeholder="Nhập tên sách..."
            />
          </div>

          <!-- Tác giả -->
          <div class="mb-4">
            <label for="author" class="form-label fw-semibold"> Tác giả </label>
            <input
              type="text"
              id="author"
              class="form-control form-control-lg"
              placeholder="Nhập tên tác giả..."
            />
          </div>

          <!-- Thể loại -->
          <div class="mb-4">
            <label for="category" class="form-label fw-semibold">
              Thể loại
            </label>
            <select id="category" class="form-select form-select-lg">
              <option selected disabled>Chọn thể loại...</option>
              <option>Tiểu thuyết</option>
              <option>Khoa học</option>
              <option>Kinh doanh</option>
              <option>Lập trình</option>
            </select>
          </div>

          <!-- Button -->
          <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
            Thêm sách
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
