<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../CSS//Popup_Dangky.css" />
    <style>
      button:hover {
        background-color: rgb(12, 148, 172);
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="background">
      <h1 style="color: red">Đăng Ký nhận khuyến mãi</h1>
      <p>
        Nhập email của bạn để không bỏ lỡ các chương trình khuyến mãi hấp dẫn!
      </p>
      <div>
        <input
          type="email"
          placeholder="Nhập email của bạn"
          style="border-radius: 5px"
        />
        <button
          style="
            background-color: rgb(12, 148, 172);
            border-radius: 5px;
            color: white;
            width: 100px;
          "
        >
          Đăng Ký
        </button>
      </div>
    </div>
  </body>
</html>
