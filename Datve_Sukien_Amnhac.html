<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Đăng ký đặt vé sự kiện âm nhạc</h1>
    <label for="name">Họ và tên:</label>
    <input
      type="text"
      id="name"
      name="name"
      required
      placeholder="Nhập họ và tên..."
    />
    <br />
    <br />
    <label for="quantity">Số lượng vé:</label>
    <input
      type="number"
      id="quantity"
      name="quantity"
      required
      min="1"
      placeholder="Nhập số lượng vé..."
    />
    <br />
    <br />
    <label for="vipCode">Mã vé VIP (đã được cấp sẵn):</label>
    <input type="text" id="vipCode" name="vipCode" readonly value="Vip Code" />
    <br />
    <br />
    <label for="internalVoucher">Mã giảm giá nội bộ:</label>
    <input
      type="text"
      id="internalVoucher"
      name="internalVoucher"
      value="Internal Voucher"
      disabled
    /><br />
    <br />
    <input type="submit" value="Xác nhận đặt vé" />
  </body>
</html>
