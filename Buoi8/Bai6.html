<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Form Tìm Kiếm Tour</title>
  </head>

  <body class="bg-gray-100 py-10">
    <!-- Container -->
    <div class="max-w-5xl mx-auto bg-white p-8 rounded-xl shadow">
      <!-- Form -->
      <form class="grid grid-cols-1 md:grid-cols-3 gap-5 items-end">
        <!-- Điểm đến -->
        <div>
          <label class="block text-2xl font-bold mb-3"> Điểm đến </label>

          <input
            type="text"
            placeholder="Bạn muốn đi đâu?"
            class="w-full border border-gray-300 rounded-lg px-5 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <!-- Ngày đi -->
        <div>
          <label class="block text-2xl font-bold mb-3"> Ngày đi </label>

          <input
            type="date"
            class="w-full border border-gray-300 rounded-lg px-5 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-4 rounded-lg transition"
        >
          Tìm kiếm
        </button>
      </form>
    </div>
  </body>
</html>
