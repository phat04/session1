<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Các Tour Nổi Bật</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 py-10">
    <section class="max-w-6xl mx-auto px-5">
      <h1 class="text-4xl font-bold text-center mb-10">Các Tour Nổi Bật</h1>

      <!-- Grid -->
      <div class="grid grid-cols-3 gap-8">
        <!-- Card 1 -->
        <div class="bg-white rounded-xl overflow-hidden shadow-md">
          <img
            src="https://cdn.tourradar.com/s3/serp/1500x800/4600_t8afNwa2.jpg"
            alt="Thái Lan"
            class="w-full h-56 object-cover"
          />

          <div class="p-5 text-center">
            <h2 class="text-2xl font-bold mb-2">Thái Lan</h2>

            <p class="text-gray-500">Xứ sở chùa vàng</p>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="bg-white rounded-xl overflow-hidden shadow-md">
          <img
            src="https://cdn.saigontimestravel.com/storage/images/retail/wp-content/uploads/2023/12/gioi-thieu-ve-dat-nuoc-nhat-ban-1.jpg"
            alt="Nhật Bản"
            class="w-full h-56 object-cover"
          />

          <div class="p-5 text-center">
            <h2 class="text-2xl font-bold mb-2">Nhật Bản</h2>

            <p class="text-gray-500">Hoa anh đào rực rỡ</p>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="bg-white rounded-xl overflow-hidden shadow-md">
          <img
            src="https://ofotravel.com/wp-content/uploads/2018/10/Top-dia-diem-du-lich-phap-nhat-dinh-phai-den-mot-lan-trong-doi-eurocircle-ofotravel.jpg"
            alt="Pháp"
            class="w-full h-56 object-cover"
          />

          <div class="p-5 text-center">
            <h2 class="text-2xl font-bold mb-2">Pháp</h2>

            <p class="text-gray-500">Kinh đô ánh sáng</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
