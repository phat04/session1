<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dịch Vụ Đi Kèm</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <section class="max-w-6xl mx-auto px-4 py-12">
      <h2 class="text-3xl font-semibold text-center mb-10">Dịch Vụ Đi Kèm</h2>

      <!-- Grid Container -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Component Dịch Vụ -->
        <div
          class="bg-white rounded-xl p-6 text-center shadow hover:shadow-lg transition transform hover:-translate-y-1"
        >
          <div class="text-blue-500 mb-4 text-4xl">
            <!-- Thay bằng SVG hoặc icon FontAwesome -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="mx-auto h-12 w-12"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 21v-6a9 9 0 0118 0v6H3z"
              />
            </svg>
          </div>
          <h3 class="text-xl font-semibold mb-2">Khách Sạn</h3>
          <p class="text-gray-600 text-sm">
            Hệ thống khách sạn chuẩn quốc tế cao cấp và tiện nghi.
          </p>
        </div>

        <div
          class="bg-white rounded-xl p-6 text-center shadow hover:shadow-lg transition transform hover:-translate-y-1"
        >
          <div class="text-blue-500 mb-4 text-4xl">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="mx-auto h-12 w-12"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8c-3 0-6 3-6 6v4h12v-4c0-3-3-6-6-6z"
              />
            </svg>
          </div>
          <h3 class="text-xl font-semibold mb-2">Vé Máy Bay</h3>
          <p class="text-gray-600 text-sm">
            Đối tác từ các hãng hàng không hàng đầu thế giới.
          </p>
        </div>

        <div
          class="bg-white rounded-xl p-6 text-center shadow hover:shadow-lg transition transform hover:-translate-y-1"
        >
          <div class="text-blue-500 mb-4 text-4xl">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="mx-auto h-12 w-12"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 12l2 2 4-4m0 6v2a2 2 0 01-2 2H9a2 2 0 01-2-2v-2h6z"
              />
            </svg>
          </div>
          <h3 class="text-xl font-semibold mb-2">Bảo Hiểm</h3>
          <p class="text-gray-600 text-sm">
            Đảm bảo an toàn 100% trong mọi tình huống khẩn cấp.
          </p>
        </div>

        <div
          class="bg-white rounded-xl p-6 text-center shadow hover:shadow-lg transition transform hover:-translate-y-1"
        >
          <div class="text-blue-500 mb-4 text-4xl">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="mx-auto h-12 w-12"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 10h.01M12 10h.01M16 10h.01M9 16h6"
              />
            </svg>
          </div>
          <h3 class="text-xl font-semibold mb-2">Hướng Dẫn</h3>
          <p class="text-gray-600 text-sm">
            Đội ngũ hướng dẫn viên người bản địa giàu kinh nghiệm.
          </p>
        </div>
      </div>
    </section>
  </body>
</html>
